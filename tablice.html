<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tablice PHP</title>
</head>
<body>

<h2>Stałe tablice</h2>

<?php
// --- STAŁE TABLICE ---
$tablica1 = array(1, 2, 3, 4, 5);
$tablica2 = array(10, 20, 30, 40, 50);

echo "Tablica1: " . implode(", ", $tablica1) . "<br>";
echo "Tablica2: " . implode(", ", $tablica2) . "<br>";
?>

<h2>Losowe tablice (zmieniają się po F5)</h2>

<?php

function generujTablice($dlugosc) {
    $tablica = array();
    for ($i = 0; $i < $dlugosc; $i++) {
        $tablica[] = rand(0, 100);
    }
    return $tablica;
}


$tablica3 = generujTablice(5);
$tablica4 = generujTablice(5);

echo "Tablica3: " . implode(", ", $tablica3) . "<br>";
echo "Tablica4: " . implode(", ", $tablica4) . "<br>";
?>

<h2>Wynik dodawania</h2>

<?php

$wynik = array_map(function($a, $b) {
    return $a + $b;
}, $tablica3, $tablica4);

echo "Wynik: " . implode(", ", $wynik);
?>

</body>
</html>
