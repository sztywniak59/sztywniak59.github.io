<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  body {
    margin: 0;
    background: #70c5ce;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: #70c5ce;
    border: 2px solid #000;
  }
</style>
</head>
<body>

<canvas id="game" width="320" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
  x: 50,
  y: 150,
  radius: 12,
  velocity: 0,
  gravity: 0.5,
  lift: -8
};

let pipes = [];
let coins = [];
let powerups = [];
let frame = 0;
let score = 0;
let gameOver = false;
let pipeSpeed = 2;
let slowTimer = 0;

function jump() {
  bird.velocity = bird.lift;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
canvas.addEventListener("click", jump);

function addPipe() {
  const gap = 120;
  const top = Math.random() * (canvas.height - gap - 80) + 40;
  pipes.push({
    x: canvas.width,
    top,
    bottom: top + gap,
    passed: false
  });

  // coin
  if (Math.random() < 0.6) {
    coins.push({
      x: canvas.width + 15,
      y: top + gap / 2,
      r: 6
    });
  }

  // powerup
  if (Math.random() < 0.2) {
    powerups.push({
      x: canvas.width + 15,
      y: Math.random() * 300 + 80,
      r: 8
    });
  }
}

function reset() {
  bird.y = 150;
  bird.velocity = 0;
  pipes = [];
  coins = [];
  powerups = [];
  score = 0;
  pipeSpeed = 80;
  slowTimer = 0;
  gameOver = false;
}

function collide(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy) < a.r + b.r;
}

function update() {
  if (gameOver) return;

  frame++;
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (frame % 90 === 0) addPipe();

  if (slowTimer > 0) slowTimer--;
  pipeSpeed = slowTimer > 0 ? 1 : 2;

  pipes.forEach(pipe => {
    pipe.x -= pipeSpeed;

    if (!pipe.passed && pipe.x + 30 < bird.x) {
      score++;
      pipe.passed = true;
    }

    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + 30 &&
      (bird.y - bird.radius < pipe.top ||
       bird.y + bird.radius > pipe.bottom)
    ) {
      gameOver = true;
    }
  });

  coins = coins.filter(c => {
    c.x -= pipeSpeed;
    if (collide({x: bird.x, y: bird.y, r: bird.radius}, c)) {
      score += 5000;
      return false;
    }
    return c.x > 0;
  });

  powerups = powerups.filter(p => {
    p.x -= pipeSpeed;
    if (collide({x: bird.x, y: bird.y, r: bird.radius}, p)) {
      slowTimer = 300; // ~5s
      return false;
    }
    return p.x > 0;
  });

  if (bird.y > canvas.height || bird.y < 0) gameOver = true;
}

function draw() {
  // day / night
  ctx.fillStyle = score >= 10 ? "#1a1a2e" : "#70c5ce";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // bird
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fillStyle = "yellow";
  ctx.fill();

  // pipes
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, 20, p.top);
    ctx.fillRect(p.x, p.bottom, 30, canvas.height);
  });

  // coins
  ctx.fillStyle = "gold";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // powerups
  ctx.fillStyle = "cyan";
  powerups.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // HUD
  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "28px Arial";
    ctx.fillText("GAME OVER", 60, 240);
    ctx.font = "14px Arial";
    ctx.fillText("Kliknij aby zagrać ponownie", 55, 270);
  }
}

canvas.addEventListener("click", () => {
  if (gameOver) r();
});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>


</body>
</html>
