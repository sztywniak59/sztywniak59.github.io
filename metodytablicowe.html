<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablice użytkownika</title>
<style>
  body {
    font-family: Arial;
    background: #f0f2f5;
    padding: 20px;
  }

  input {
    padding: 8px;
    margin-right: 10px;
  }

  button {
    padding: 6px 10px;
    margin-left: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .add-btn { background: #4CAF50; color: black; }
  .delete-btn { background: #e74c3c; color: white; }
  .up-btn { background: #3498db; color: white; }
  .down-btn { background: #9b59b6; color: white; }

  li {
    list-style: none;
    background: white;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

<h2>HEJ Dodaj nową tablicę kumplu</h2>
<input type="text" id="arrayName" placeholder="Nazwa tablicy">
<button class="add-btn" onclick="addArray()">Dodaj coś FAJNEGO</button>

<h2>Lista tablic</h2>
<ul id="arrayList"></ul>

<script>
let arrays = [];

function addArray() {
  const name = document.getElementById("arrayName").value;

  if (name === "") {
    alert("Podaj nazwę mordeczko!");
    return;
  }

  arrays.push({ name: name, items: [] });
  document.getElementById("arrayName").value = "";
  render();
}

function deleteArray(index) {
  arrays.splice(index, 1);
  render();
}

function moveUp(index) {
  if (index === 0) return;
  [arrays[index - 1], arrays[index]] = [arrays[index], arrays[index - 1]];
  render();
}

function moveDown(index) {
  if (index === arrays.length - 1) return;
  [arrays[index + 1], arrays[index]] = [arrays[index], arrays[index + 1]];
  render();
}

function render() {
  const list = document.getElementById("arrayList");
  list.innerHTML = "";

  arrays.forEach((arr, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <strong>${arr.name}</strong>
      <button class="delete-btn" onclick="deleteArray(${index})">Usuń</button>
      <button class="up-btn" onclick="moveUp(${index})">⬆</button>
      <button class="down-btn" onclick="moveDown(${index})">⬇</button>
    `;

    list.appendChild(li);
  });
}
</script>

</body>
</html>
