<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Strona DOM – wszystko w jednym</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 40px;
  transition: background-color 0.3s;
}

input[type="button"] {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

#container {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

.box {
  padding: 10px 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
  display: flex;
  gap: 10px;
  align-items: center;
  cursor: grab;
}
</style>
</head>

<body>

<h1 id="naglowek">mily</h1>

<!-- ZMIANA TEKSTU -->
<p id="tekst">Zmiana tekstu</p>
<input type="button" id="btnTekst" value="Zmień tekst">

<br><br>

<!-- IMIĘ -->
<input type="text" id="imie" placeholder="Wpisz imię">
<input type="button" id="btnImie" value="Pokaż imię">
<p id="wynik"></p>

<!-- KOLOR -->
<input type="button" id="btnKolor" value="Zmień kolor tła">

<hr>

<!-- DODAWANIE / USUWANIE -->
<input type="button" id="addBtn" value="Wstaw element">
<input type="button" id="addFrontBtn" value="Wstaw na początek">

<div id="container">
  <div class="box" draggable="true">
    <span>Element 1</span>
    <input type="button" value="Edytuj">
    <input type="button" value="Usuń">
  </div>
  <div class="box" draggable="true">
    <span>Element 2</span>
    <input type="button" value="Edytuj">
    <input type="button" value="Usuń">
  </div>
</div>

<script>

// ===== ZMIANA TEKSTU =====
const tekst = document.getElementById("tekst");
const btnTekst = document.getElementById("btnTekst");
let tekstZmieniony = false;
const oryginalnyTekst = tekst.textContent;

btnTekst.onclick = () => {
  tekst.textContent = tekstZmieniony
    ? oryginalnyTekst
    : "Tekst został zmieniony!";
  btnTekst.value = tekstZmieniony
    ? "Zmień tekst"
    : "Cofnij tekst";
  tekstZmieniony = !tekstZmieniony;
};

// ===== IMIĘ =====
const inputImie = document.getElementById("imie");
const btnImie = document.getElementById("btnImie");
const wynik = document.getElementById("wynik");
let imieWidoczne = false;

btnImie.onclick = () => {
  if (!imieWidoczne) {
    wynik.textContent = "Cześć " + inputImie.value + "!";
    btnImie.value = "Cofnij";
  } else {
    wynik.textContent = "";
    inputImie.value = "";
    btnImie.value = "Pokaż imię";
  }
  imieWidoczne = !imieWidoczne;
};

// ===== KOLOR =====
const btnKolor = document.getElementById("btnKolor");
let kolorZmieniony = false;
const oryginalnyKolor = document.body.style.backgroundColor;

btnKolor.onclick = () => {
  document.body.style.backgroundColor = kolorZmieniony
    ? oryginalnyKolor
    : "#" + Math.floor(Math.random() * 16777215).toString(16);
  btnKolor.value = kolorZmieniony
    ? "Zmień kolor tła"
    : "Cofnij kolor";
  kolorZmieniony = !kolorZmieniony;
};

// ===== DODAWANIE / USUWANIE =====
const container = document.getElementById("container");
const addBtn = document.getElementById("addBtn");
const addFrontBtn = document.getElementById("addFrontBtn");
let counter = 1;

function randomColor() {
  return `hsl(${Math.random() * 360}, 70%, 70%)`;
}

let dragged = null;

function addDragEvents(element) {

  element.addEventListener("dragstart", () => {
    dragged = element;
    element.style.opacity = "0.5";
  });

  element.addEventListener("dragend", () => {
    element.style.opacity = "1";
  });

  element.addEventListener("dragover", e => {
    e.preventDefault();
  });

  element.addEventListener("drop", e => {
    e.preventDefault();

    if (dragged !== element) {
      const all = [...container.children];
      const draggedIndex = all.indexOf(dragged);
      const targetIndex = all.indexOf(element);

      if (draggedIndex < targetIndex) {
        element.after(dragged);
      } else {
        element.before(dragged);
      }
    }
  });
}

function createBox(text) {

  const div = document.createElement("div");
  div.className = "box";
  div.style.backgroundColor = randomColor();
  div.draggable = true;

  const span = document.createElement("span");
  span.textContent = text;

  const editBtn = document.createElement("input");
  editBtn.type = "button";
  editBtn.value = "Edytuj";

  editBtn.onclick = () => {

    const newText = prompt("Podaj nowy tekst:", span.textContent);
    if (newText !== null && newText !== "") {
      span.textContent = newText;
    }

    const newId = prompt("Podaj nowe ID elementu:", div.id);
    if (newId !== null && newId !== "") {
      div.id = newId;
    }

  };

  const removeBtn = document.createElement("input");
  removeBtn.type = "button";
  removeBtn.value = "Usuń";
  removeBtn.onclick = () => div.remove();

  div.append(span, editBtn, removeBtn);

  addDragEvents(div);

  return div;
}

// obsługa istniejących elementów
document.querySelectorAll(".box").forEach(box => {

  const span = box.querySelector("span");
  const editBtn = box.children[1];
  const removeBtn = box.children[2];

  editBtn.onclick = () => {

    const newText = prompt("Podaj nowy tekst:", span.textContent);
    if (newText !== null && newText !== "") {
      span.textContent = newText;
    }

    const newId = prompt("Podaj nowe ID elementu:", box.id);
    if (newId !== null && newId !== "") {
      box.id = newId;
    }

  };

  removeBtn.onclick = () => box.remove();

  addDragEvents(box);

});

// dodawanie elementów
addBtn.onclick = () => {
  container.appendChild(createBox(`Nowy ${counter++}`));
};

addFrontBtn.onclick = () => {
  container.prepend(createBox(`Nowy ${counter++}`));
};

</script>

</body>
</html>
