<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tabliczka mnożenia do 100</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            margin-top: 20px;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            width: 40px;
            height: 40px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        td {
            background-color: white;
        }
        td:hover {
            background-color: #d4edda;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Tabliczka mnożenia do 100</h1>

<table id="multiplicationTable"></table>

<script>
    const table = document.getElementById("multiplicationTable");

    for (let i = 0; i <= 10; i++) {
        const row = document.createElement("tr");

        for (let j = 0; j <= 10; j++) {
            const cell = document.createElement(i === 0 || j === 0 ? "th" : "td");

            if (i === 0 && j === 0) {
                cell.textContent = "×";
            } else if (i === 0) {
                cell.textContent = j;
            } else if (j === 0) {
                cell.textContent = i;
            } else {
                cell.textContent = i * j;
            }

            row.appendChild(cell);
        }

        table.appendChild(row);
    }
</script>

</body>
</html>
