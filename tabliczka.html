<!DOCTYPE html>
<html>
<head>
<style>
  table {
    border-collapse: collapse;
    font-family: Arial;
  }
  td {
    border: 1px solid black;
    width: 40px;
    height: 40px;
    text-align: center;
  }
  .even {
    background-color: lightblue;
  }
  .odd {
    background-color: lightyellow;
  }
</style>
</head>
<body>

<table id="tab"></table>

<script>
const table = document.getElementById("tab");

const tabliczka = Array(10).fill(0).map((_, i) =>
  Array(10).fill(0).map((_, j) => (i + 1) * (j + 1))
);

tabliczka.forEach(row => {
  const tr = document.createElement("tr");

  row.forEach(num => {
    const td = document.createElement("td");
    td.textContent = num;

    if (num % 2 === 0) {
      td.className = "even";
    } else {
      td.className = "odd";
    }

    tr.appendChild(td);
  });

  table.appendChild(tr);
});
</script>

</body>
</html>
