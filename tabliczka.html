<!DOCTYPE html>
<html>
<head>
<style>
table {
  border-collapse: collapse;
  font-family: Arial;
}
td {
  border: 1px solid black;
  width: 40px;
  height: 40px;
  text-align: center;
}
td:hover {
  background-color: lightgreen;
}
</style>
</head>
<body>

<table id="tab"></table>

<script>
const tabela = document.getElementById("tab");

// tworzymy tablicę 10x10 używając new Array
const tabliczka = new Array(10);

for (let i = 0; i < 10; i++) {
  tabliczka[i] = new Array(10);

  for (let j = 0; j < 10; j++) {
    tabliczka[i][j] = (i + 1) * (j + 1);
  }
}

// tworzenie tabeli HTML
for (let i = 0; i < 10; i++) {
  const tr = document.createElement("tr");

  for (let j = 0; j < 10; j++) {
    const td = document.createElement("td");
    td.textContent = tabliczka[i][j];
    tr.appendChild(td);
  }

  tabela.appendChild(tr);
}
</script>

</body>
</html>
